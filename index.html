<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resin Art Studio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #faf6f0;
            color: #333;
        }

        /* --- Welcome Video Section --- */
        .video-container {
            position: relative;
            width: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Laptop/Desktop View: 16:9 Aspect Ratio */
        @media (min-width: 769px) {
            .video-container {
                aspect-ratio: 16 / 9;
                max-height: 80vh;
            }
        }

        /* Mobile View: 9:16 Aspect Ratio */
        @media (max-width: 768px) {
            .video-container {
                aspect-ratio: 9 / 16;
                height: 90vh; /* Takes up most of the mobile screen */
            }
        }

        /* --- Main Content --- */
        .content {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            color: #4a3b32;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #8c7a6b;
            margin-bottom: 40px;
        }

        /* --- Product Catalog --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .product-card {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: left;
        }

        .product-img {
            width: 100%;
            height: 250px;
            background-color: #eaddca; /* Placeholder background */
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8c7a6b;
        }

        .product-title {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .product-price {
            font-weight: bold;
            color: #b58263;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        /* --- Order Form --- */
        .order-section {
            background: #fff;
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: left;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a3b32;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .submit-btn {
            width: 100%;
            background-color: #25D366; /* WhatsApp Green */
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background-color: #128C7E;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay loop muted playsinline>
            <source src="your-welcome-video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="content">
        <h1>Handcrafted Resin Art</h1>
        <p class="subtitle">Scan, Watch, and Bring Aesthetics Home</p>

        <div class="products-grid">
            <div class="product-card">
                <div class="product-img"><span>[ Resin Coaster Image ]</span></div>
                <h3 class="product-title">Ocean Wave Coaster Set</h3>
                <p class="product-price">₹ 1,299</p>
            </div>
            <div class="product-card">
                <div class="product-img"><span>[ Resin Clock Image ]</span></div>
                <h3 class="product-title">Geode Wall Clock (12")</h3>
                <p class="product-price">₹ 3,499</p>
            </div>
        </div>

        <div class="order-section">
            <h2 style="margin-bottom: 20px; text-align: center; color: #4a3b32;">Place Your Order</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label for="phone">Your WhatsApp Number (Sign-in)</label>
                    <input type="tel" id="phone" placeholder="e.g. 9876543210" required>
                </div>

                <div class="form-group">
                    <label for="productSelect">Select Product</label>
                    <select id="productSelect" required>
                        <option value="" disabled selected>Choose art piece...</option>
                        <option value="Ocean Wave Coaster Set (₹ 1,299)">Ocean Wave Coaster Set (₹ 1,299)</option>
                        <option value="Geode Wall Clock (₹ 3,499)">Geode Wall Clock (₹ 3,499)</option>
                    </select>
                </div>

                <button type="button" class="submit-btn" onclick="sendOrder()">Order via WhatsApp</button>
            </form>
        </div>
    </div>

    <script>
        function sendOrder() {
            // Your business phone number (Include Country Code, No spaces/plus signs)
            // Example: 91 for India + 10 digit number
            const ownerPhoneNumber = "919042460692"; 

            const customerPhone = document.getElementById('phone').value;
            const selectedProduct = document.getElementById('productSelect').value;

            if (!customerPhone || !selectedProduct) {
                alert("Please fill in all details before submitting.");
                return;
            }

            // Build the WhatsApp message template
            const message = `✨ *NEW RESIN ART ORDER* ✨%0A%0A` +
                            `👤 *Customer Phone:* ${customerPhone}%0A` +
                            `🎨 *Product Selected:* ${selectedProduct}%0A%0A` +
                            `Please confirm availability and sharing payment details.`;

            // Open WhatsApp link
            const whatsappUrl = `https://api.whatsapp.com/send?phone=${ownerPhoneNumber}&text=${message}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
